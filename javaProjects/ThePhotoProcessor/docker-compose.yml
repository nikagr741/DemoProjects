version: '3.8' # Docker Compose version

services:
  # Service 1: The Database
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: nikhil_user
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: task_db
    ports:
      - "5432:5432"

  # Service 2: The Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"